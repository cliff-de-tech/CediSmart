name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "cedismart-api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "cedismart-api/**"

defaults:
  run:
    working-directory: cedismart-api

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint, format, type-check, security scan
  # ---------------------------------------------------------------------------
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cedismart-api/pyproject.toml

      - name: Install lint dependencies
        run: pip install ruff black mypy bandit

      - name: Install app dependencies (needed for mypy type resolution)
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check .

      - name: Black — format check
        run: black --check .

      - name: Mypy — strict type check
        run: mypy app/ --strict

      - name: Bandit — security scan (medium+ severity)
        run: bandit -r app/ -ll

  # ---------------------------------------------------------------------------
  # Job 2: Run tests against real Postgres + Redis
  # Depends on lint-and-type-check passing first.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cedismart
          POSTGRES_PASSWORD: cedismart
          POSTGRES_DB: cedismart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://cedismart:cedismart@localhost:5432/cedismart_test
      TEST_DATABASE_URL: postgresql+asyncpg://cedismart:cedismart@localhost:5432/cedismart_test
      TEST_USE_REAL_REDIS: "true"
      REDIS_URL: redis://localhost:6379/0
      # RS256 test keys — generated for CI only, not used in production
      RSA_PRIVATE_KEY: ${{ secrets.CI_RSA_PRIVATE_KEY }}
      RSA_PUBLIC_KEY: ${{ secrets.CI_RSA_PUBLIC_KEY }}
      ENVIRONMENT: testing
      DEBUG: "false"
      ALLOWED_ORIGINS: "http://localhost:3000"
      TERMII_API_KEY: "ci-stub"
      TERMII_SENDER_ID: "CediSmart"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cedismart-api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations against test database
        # Validates migration files are correct before running tests
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: cedismart-api/coverage.xml
          flags: backend
          fail_ci_if_error: false  # Don't fail CI if Codecov is unavailable
